<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>活用データベース</title>
  <style>
    :root {
      --primary-color: #4caf50;
      --accent-color: #ff9800;
      --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      --cream-bg: #fffaf0;
      /* 分類ごとの色設定 */
      --tag-cooking: #ffb6c1; /* 料理: ピンク */
      --tag-drink: #87cefa;   /* 飲み物: 青 */
      --tag-goods: #deb887;   /* 雑貨: テラコッタ */
      --tag-other: #607d8b;   /* その他: グレー */
      --tag-cosmetic: #fd951e;   /* 化粧品など: オレンジ */
      --tag-default: #4caf50; /* デフォルト: 緑 */
    }

    body {
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      background: var(--bg-gradient);
      background-attachment: fixed;
      margin: 0; padding: 20px; color: #333;
    }

    h1 { text-align: center; color: #2e7d32; font-size: 1.8rem; margin-bottom: 30px; }

    /* 投稿フォーム */
    .post-form-container {
      max-width: 600px; margin: 0 auto 40px; background: white;
      padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    .form-title { font-weight: bold; color: var(--primary-color); margin-bottom: 15px; display: block; font-size: 1.1rem; }
    .post-form input, .post-form textarea, .post-form select {
      width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; outline: none;
    }
    .post-form textarea { height: 100px; resize: none; }

    #imagePreview {
      max-width: 100%; max-height: 150px; object-fit: contain; margin-bottom: 15px; border: 1px solid #eee; display: none;
    }

    #submitBtn {
      width: 100%; padding: 15px; background: var(--primary-color); color: white; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    #submitBtn:hover { opacity: 0.9; }

    /* 検索窓 */
    .search-container { max-width: 600px; margin: 40px auto 30px; }
    .search-hint {
      text-align: center;
      margin-top: 10px;
      color: #666;
    }
    #searchInput {
      width: 100%; padding: 15px 20px; font-size: 16px; border: none; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; outline: none;
    }

    /* グリッドレイアウト */
    #data {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; max-width: 1200px; margin: 0 auto;
    }

    .card {
      background: rgba(255, 255, 255, 0.95); border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      overflow: hidden; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-5px); }

    .photo-container {
      width: 100%; height: 200px; background: var(--cream-bg);
      display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f0ece2;
    }
    .photo-container img { width: 100%; height: 100%; object-fit: cover; }

    .info-container { padding: 15px; flex-grow: 1; }

    /* 分類タグ */
    .category-tag {
      font-size: 0.75em; color: black; padding: 3px 10px; border-radius: 5px; margin-bottom: 8px; display: inline-block; font-weight: bold;
    }
    .tag-料理 { background-color: var(--tag-cooking); }
    .tag-飲み物 { background-color: var(--tag-drink); }
    .tag-雑貨 { background-color: var(--tag-goods); }
    .tag-化粧品など { background-color: var(--tag-cosmetic); }
    .tag-その他 { background-color: var(--tag-other); }
    .tag-未分類 { background-color: var(--tag-default); }

    .name { font-size: 1.2em; font-weight: 800; color: #1b5e20; margin-bottom: 8px; }
    .ingredients { color: #666; font-size: 0.85em; background: #f0f4f1; padding: 4px 12px; border-radius: 20px; display: inline-block; }

    .details { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee; }
    .details p { line-height: 1.5; font-size: 0.9em; color: #444; margin: 0; }

    #status { text-align: center; color: #666; margin-bottom: 10px; }
  </style>
</head>
<body>

  <h1>🍳 活用データベース</h1>

  <div class="post-form-container">
    <span class="form-title">新しい活用を投稿する 📝</span>
    <div class="post-form">
      <input type="text" id="postName" placeholder="活用名（例：ハーブティー）">

      <select id="postCategory">
        <option value="">分類を選択してください</option>
        <option value="料理">料理</option>
        <option value="飲み物">飲み物</option>
        <option value="雑貨">雑貨</option>
        <option value="化粧品など">化粧品など</option>
        <option value="その他">その他</option>
      </select>

      <input type="text" id="postIngredients" placeholder="使用した産物">
      <textarea id="postNotes" placeholder="備考・レシピ"></textarea>

      <label style="font-size: 0.9em; color: #666;">写真を選択（任意）：</label>
      <input type="file" id="postImage" accept="image/*">
      <img id="imagePreview" src="#" alt="プレビュー">

      <button id="submitBtn">投稿して保存</button>
    </div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="名前、食材、分類で検索...">

    <p class="search-hint">
      🔎 カードをタップするとレシピ・詳細を参照できます
    </p>
  </div>

  <div id="status"></div>
  <div id="data"></div>

  <script>
    const DATA_URL = "https://script.google.com/macros/s/AKfycbwKUvCBesjSkshkBzFX5QXgYDRH2LTJ5B4K-S--t-a8FGxZvxbrGGs8Xq-P3weZzTBBYQ/exec";

    let allData = [];

    // 写真プレビュー
    document.getElementById("postImage").addEventListener("change", function(e) {
      const file = e.target.files[0];
      const preview = document.getElementById("imagePreview");
      if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
          preview.src = event.target.result;
          preview.style.display = "block";
        };
        reader.readAsDataURL(file);
      }
    });

    // 投稿送信
    document.getElementById("submitBtn").addEventListener("click", async () => {
      const name = document.getElementById("postName").value;
      const category = document.getElementById("postCategory").value;
      const ingredients = document.getElementById("postIngredients").value;
      const notes = document.getElementById("postNotes").value;
      const fileInput = document.getElementById("postImage");
      const file = fileInput.files[0];

      if (!name) { alert("活用名は必ず入力してください"); return; }

      const btn = document.getElementById("submitBtn");
      btn.disabled = true; btn.innerText = "送信中...";

      let imageData = null;
      if (file) {
        imageData = await new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const max_size = 1000;
              let width = img.width; let height = img.height;
              if (width > height) {
                if (width > max_size) { height *= max_size / width; width = max_size; }
              } else {
                if (height > max_size) { width *= max_size / height; height = max_size; }
              }
              canvas.width = width; canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      try {
        await fetch(DATA_URL, {
          method: "POST",
          body: JSON.stringify({ name, category, ingredients, notes, imageFile: imageData })
        });
        alert("投稿完了しました！");
        location.reload();
      } catch (error) {
        alert("送信失敗しました。");
      } finally {
        btn.disabled = false; btn.innerText = "投稿して保存";
      }
    });

    // 一覧描画
    function displayData(data) {
      const container = document.getElementById("data");
      container.innerHTML = "";
      const sortedData = [...data].reverse();

      sortedData.forEach((item, index) => {
        if (!item["活用名"] && !item["画像データ"]) return;

        const name = item["活用名"] || "（名称なし）";
        const category = item["分類"] || "未分類";
        const ingredients = item["使用した産物"] || "（未入力）";
        const notes = item["備考"] || "";
        const photoData = item["画像データ"];

        const tagClass = `tag-${category}`;

        const photoHtml = (photoData && photoData.startsWith("data:image"))
          ? `<div class="photo-container"><img src="${photoData}" alt="${name}"></div>`
          : "";

        const cardHtml = `
          <div class="card" onclick="toggleDetails(${index})">
            ${photoHtml}
            <div class="info-container">
              <span class="category-tag ${tagClass}">${category}</span>
              <div class="name">${name}</div>
              <div class="ingredients">${ingredients}</div>
              <div id="details-${index}" class="details">
                <p>${notes.replace(/\n/g, '<br>')}</p>
              </div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML("beforeend", cardHtml);
      });
    }

    function toggleDetails(index) {
      const el = document.getElementById(`details-${index}`);
      if (el) el.style.display = el.style.display === "block" ? "none" : "block";
    }

    async function loadData() {
      const statusEl = document.getElementById("status");
      statusEl.innerText = "読み込み中...";
      try {
        const res = await fetch(DATA_URL);
        allData = await res.json();
        statusEl.innerText = "";
        displayData(allData);
      } catch (err) {
        statusEl.innerText = "読み込み失敗しました。";
      }
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allData.filter(item =>
        (item["活用名"] || "").toLowerCase().includes(q) ||
        (item["分類"] || "").toLowerCase().includes(q) ||
        (item["使用した産物"] || "").toLowerCase().includes(q) ||
        (item["備考"] || "").toLowerCase().includes(q)
      );
      displayData(filtered);
    });

    loadData();
  </script>
</body>
</html>
